<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高报 MIS 管理平台</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --panel: rgba(255,255,255,0.9);
      --line: rgba(32, 42, 68, 0.12);
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #0b6bcb;
      --brand-strong: #084f98;
      --accent: #d17b0f;
      --danger: #c0392b;
      --shadow: 0 16px 48px rgba(31, 41, 55, 0.12);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(209,123,15,0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(11,107,203,0.18), transparent 28%),
        linear-gradient(180deg, #f9f6ef 0%, #efe8db 100%);
      min-height: 100vh;
    }

    button, input, textarea, select {
      font: inherit;
    }

    .hidden { display: none !important; }

    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-card {
      width: min(420px, 100%);
      background: var(--panel);
      backdrop-filter: blur(18px);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.1;
    }

    .sub {
      color: var(--muted);
      margin: 0 0 24px;
      line-height: 1.6;
    }

    .stack { display: grid; gap: 14px; }
    .field { display: grid; gap: 8px; }
    .field label { font-size: 14px; color: var(--muted); }

    input, textarea, select {
      width: 100%;
      border: 1px solid rgba(31,41,55,0.14);
      background: rgba(255,255,255,0.92);
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: rgba(11,107,203,0.5);
      box-shadow: 0 0 0 4px rgba(11,107,203,0.08);
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease, background 0.16s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.56; cursor: not-allowed; transform: none; }
    .btn-primary { background: linear-gradient(135deg, var(--brand), var(--brand-strong)); color: #fff; font-weight: 700; }
    .btn-secondary { background: rgba(11,107,203,0.08); color: var(--brand-strong); }
    .btn-danger { background: rgba(192,57,43,0.1); color: var(--danger); }

    .tip {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(11,107,203,0.06);
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      padding: 22px 18px;
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,0.66);
      backdrop-filter: blur(16px);
    }

    .brand {
      padding: 12px 14px 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .brand strong { display: block; font-size: 22px; }
    .brand span { color: var(--muted); font-size: 14px; }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button,
    .nav a {
      text-align: left;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    .nav button.active,
    .nav a.active {
      background: rgba(11,107,203,0.1);
      border-color: rgba(11,107,203,0.16);
      color: var(--brand-strong);
      font-weight: 700;
    }

    .main {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .topbar, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
    }

    .topbar h2 { margin: 0; font-size: 26px; }
    .topbar p { margin: 6px 0 0; color: var(--muted); }

    .panel { padding: 18px; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .metric {
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(243,247,255,0.88));
      border: 1px solid rgba(31,41,55,0.08);
    }

    .metric span { color: var(--muted); font-size: 13px; }
    .metric strong { display: block; margin-top: 10px; font-size: 28px; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 960px;
      background: rgba(255,255,255,0.9);
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(31,41,55,0.08);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      position: sticky;
      top: 0;
      background: #f7f8fb;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(11,107,203,0.1);
      color: var(--brand-strong);
    }

    .badge.danger { background: rgba(192,57,43,0.1); color: var(--danger); }
    .badge.success { background: rgba(16,185,129,0.12); color: #0a7a57; }

    .source-link {
      color: var(--brand-strong);
      font-weight: 600;
      text-decoration: none;
    }

    .source-link:hover {
      text-decoration: underline;
    }

    .source-link::after {
      content: ' ↗';
      font-size: 12px;
    }

    .table-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .pagination-summary {
      color: var(--muted);
      font-size: 14px;
    }

    .pagination-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pagination-actions input,
    .pagination-actions select {
      width: auto;
      min-width: 88px;
      padding: 10px 12px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.45);
      display: grid;
      place-items: center;
      padding: 24px;
      z-index: 20;
    }

    .modal-card {
      width: min(720px, 100%);
      max-height: calc(100vh - 48px);
      overflow: auto;
      background: #fff;
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field.full { grid-column: 1 / -1; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
    }

    .viewer {
      white-space: pre-wrap;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      line-height: 1.7;
      max-height: 60vh;
      overflow: auto;
    }

    .error {
      margin-top: 12px;
      color: var(--danger);
      font-size: 14px;
      min-height: 20px;
    }

    @media (max-width: 980px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="loginShell" class="login-shell">
    <div class="login-card">
      <div class="eyebrow">Gaokao MIS</div>
      <h1>高报后台管理平台</h1>
      <p class="sub">管理院校、分数、考生、员工、志愿方案、AI 请求结果和 VIP 付费项目。默认账号已按你的要求预置。</p>
      <form id="loginForm" class="stack">
        <div class="field">
          <label for="username">账号</label>
          <input id="username" name="username" value="admin" autocomplete="username" />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" name="password" type="password" value="admin123" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary" type="submit">登录管理台</button>
        <div id="loginError" class="error"></div>
      </form>
      <div class="tip">默认登录账号：admin，默认密码：admin123。上线后建议你第一时间在“员工管理”里改掉默认密码，并新增正式员工账号。</div>
    </div>
  </div>

  <div id="appShell" class="app-shell hidden">
    <aside class="sidebar">
      <div class="brand">
        <strong>高报 MIS</strong>
        <span>PC 端运营后台</span>
      </div>
      <div id="nav" class="nav"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h2 id="pageTitle">管理总览</h2>
          <p id="pageDesc">查看系统核心业务数据和最近运行状态。</p>
        </div>
        <div class="toolbar-actions">
          <span id="currentUser" class="badge"></span>
          <button id="logoutBtn" class="btn btn-secondary">退出登录</button>
        </div>
      </div>

      <section id="contentPanel" class="panel"></section>
    </main>
  </div>

  <div id="modal" class="modal hidden"></div>

  <script>
    const SECTION_DEFS = {
      dashboard: {
        label: '管理总览',
        desc: '查看系统核心业务数据和最近运行状态。',
        type: 'dashboard'
      },
      colleges: {

        endpoint: '/api/admin/colleges',
        type: 'crud',
        searchable: true,
        creatable: true,
        deletable: false,
        columns: [
          ['name', '院校'], ['province', '省份'], ['city', '城市'], ['level', '层次'], ['ranking', '排名'], ['recommendedPostgraduateRate', '保研率'], ['updatedAt', '更新时间']
        ],
        fields: [
          { name: 'id', type: 'hidden' },

          { name: 'city', label: '城市', type: 'text' },
          { name: 'level', label: '层次', type: 'text' },
          { name: 'ranking', label: '排名', type: 'text' },
          { name: 'recommendedPostgraduateRate', label: '保研率', type: 'text' },
          { name: 'schoolType', label: '办学类型', type: 'text' },
          { name: 'ownershipType', label: '性质', type: 'text' },
          { name: 'website', label: '官网', type: 'text', full: true },
          { name: 'is985', label: '985', type: 'checkbox' },
          { name: 'is211', label: '211', type: 'checkbox' },
          { name: 'isDoubleFirst', label: '双一流', type: 'checkbox' }
        ]
      },
      provinceLines: {
        label: '省控线管理',
        desc: '维护各省各科类各批次最低控制线及其来源口径。',
        endpoint: '/api/admin/province-lines',
        type: 'crud',
        searchable: true,
        creatable: true,
        deletable: true,
        columns: [
          ['province', '省份'], ['year', '年份'], ['subject', '科类'], ['batch', '批次'], ['score', '分数线'], ['sourceName', '来源'], ['updatedAt', '更新时间']
        ],
        fields: [
          { name: 'id', type: 'hidden' },
          { name: 'province', label: '省份', type: 'text', required: true },
          { name: 'year', label: '年份', type: 'number', required: true },
          { name: 'subject', label: '科类', type: 'text', required: true },
          { name: 'batch', label: '批次', type: 'text', required: true },
          { name: 'score', label: '分数线', type: 'number', required: true },
          { name: 'sourceName', label: '来源名称', type: 'text' },
          { name: 'sourceUrl', label: '来源链接', type: 'text', full: true }
        ]
      },
      scoreRanks: {
        label: '一分一段管理',
        desc: '维护分数、位次、同分人数之间的映射关系。',
        endpoint: '/api/admin/score-ranks',
        type: 'crud',
        searchable: true,
        creatable: true,
        deletable: true,
        columns: [
          ['province', '省份'], ['year', '年份'], ['subject', '科类'], ['score', '分数'], ['rank', '位次'], ['count', '同分人数'], ['updatedAt', '更新时间']
        ],
        fields: [
          { name: 'id', type: 'hidden' },
          { name: 'province', label: '省份', type: 'text', required: true },
          { name: 'year', label: '年份', type: 'number', required: true },
          { name: 'subject', label: '科类', type: 'text', required: true },
          { name: 'score', label: '分数', type: 'number', required: true },
          { name: 'rank', label: '位次', type: 'number', required: true },
          { name: 'count', label: '同分人数', type: 'number', required: true }
        ]
      },
      students: {
        label: '考生管理',
		desc: '管理小程序登录考生账号、基础档案和推荐来源。',
        endpoint: '/api/admin/students',
        type: 'crud',
        searchable: true,
        creatable: false,
        deletable: false,
        columns: [
		  ['id', 'ID'], ['nickname', '昵称'], ['phone', '手机号'], ['schoolName', '学校'], ['schoolYear', '学年'], ['className', '班级'], ['studentNo', '学号'], ['fromRecommend', '推荐来源'], ['lastLoginAt', '最近登录']
        ],
        fields: [
          { name: 'id', type: 'hidden' },
          { name: 'nickname', label: '昵称', type: 'text' },
          { name: 'phone', label: '手机号', type: 'text' },
          { name: 'idCard', label: '身份证号', type: 'text' },
          { name: 'schoolName', label: '学校', type: 'text' },
          { name: 'schoolYear', label: '学年', type: 'text' },
          { name: 'className', label: '班级', type: 'text' },
          { name: 'studentNo', label: '学号', type: 'text' },
          { name: 'fromRecommend', label: '是否来自推荐', type: 'checkbox', checkboxLabel: '标记为推荐来源' },
          { name: 'loginType', label: '登录方式', type: 'text' },
          { name: 'avatarUrl', label: '头像链接', type: 'text', full: true }
        ]
      },
      profileOptions: {

        type: 'crud',
        searchable: true,
        creatable: true,
        deletable: true,
        columns: [
          ['id', 'ID'], ['optionType', '类型'], ['optionLabel', '显示名称'], ['optionValue', '值'], ['sortOrder', '排序'], ['enabled', '启用'], ['updatedAt', '更新时间']
        ],
        fields: [
          { name: 'id', type: 'hidden' },
          { name: 'optionType', label: '类型', type: 'select', options: ['school', 'schoolYear', 'className'] },
          { name: 'optionLabel', label: '显示名称', type: 'text', required: true },
          { name: 'optionValue', label: '值', type: 'text', full: true },
          { name: 'sortOrder', label: '排序', type: 'number', required: true },
          { name: 'enabled', label: '启用', type: 'checkbox', checkboxLabel: '启用选项', full: true }
        ]
      },
      orders: {
        label: '订单管理',

        endpoint: '/api/admin/orders',
        type: 'crud',
        searchable: true,
        creatable: false,
        deletable: false,
        columns: [

        label: 'AI 请求结果管理',

        type: 'tasks',
        searchable: true
      },
      paymentItems: {
        label: '付费项目管理',
        desc: '统一维护金额、上下架、有效次数和有效期范围。',
        endpoint: '/api/admin/vip-products',
		creatable: true,
        type: 'vip'
      }
    }

    const navOrder = ['dashboard', 'colleges', 'provinceLines', 'scoreRanks', 'students', 'profileOptions', 'orders', 'staff', 'volunteers', 'aiTasks', 'paymentItems']
    const SECTION_PATHS = {
      dashboard: '/mis/dashboard',
      colleges: '/mis/colleges',
      provinceLines: '/mis/province-lines',
      scoreRanks: '/mis/score-ranks',
      students: '/mis/students',

      staff: '/mis/staff',

      aiTasks: '/mis/ai-tasks',
      paymentItems: '/mis/payment-items'
    }
    const PATH_SECTION_MAP = {
      'dashboard': 'dashboard',
      'colleges': 'colleges',
      'province-lines': 'provinceLines',
      'score-ranks': 'scoreRanks',
      'students': 'students',
      'profile-options': 'profileOptions',
      'orders': 'orders',
      'staff': 'staff',

      'ai-tasks': 'aiTasks',
      'payment-items': 'paymentItems'
    }
    const DEFAULT_PAGE_LIMIT = 20
    const PAGE_SIZE_OPTIONS = [20, 50, 100]
    const ORDER_STATUS_OPTIONS = ['', 'created', 'paid', 'closed', 'refunded']
    const emptyCollegeFilters = () => ({ keyword: '', name: '', level: '', schoolType: '', ownershipType: '', province: '', city: '', is985: '', is211: '', isDoubleFirst: '' })
    const emptyProvinceLineFilters = () => ({ keyword: '', province: '', year: '', subject: '', batch: '' })
    const emptyScoreRankFilters = () => ({ keyword: '', province: '', year: '', subject: '', score: '' })

    function getSectionPath(sectionKey, params = {}) {
      const basePath = SECTION_PATHS[sectionKey] || SECTION_PATHS.dashboard
      const query = new URLSearchParams()
      Object.entries(params).forEach(([key, value]) => {
        if (value == null || value === '') return
        query.set(key, String(value))
      })
      const search = query.toString()
      return search ? `${basePath}?${search}` : basePath
    }

    function resolveActiveSectionFromLocation() {
      const pathname = window.location.pathname.replace(/\/+$/, '')
      const segment = pathname.split('/').filter(Boolean).pop() || 'dashboard'
      return PATH_SECTION_MAP[segment] || 'dashboard'
    }

    function hydrateStateFromLocation() {
      state.active = resolveActiveSectionFromLocation()
      const searchParams = new URLSearchParams(window.location.search)
      state.orderProductId = searchParams.get('productId') || ''
      state.orderStatus = searchParams.get('status') || ''
    }

    function navigateToSection(sectionKey, params = {}) {
      window.location.href = getSectionPath(sectionKey, params)
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
    }

    function fmtDate(value) {
      if (!value) return '-'
      const date = new Date(value)
      if (Number.isNaN(date.getTime())) return value
      return date.toLocaleString('zh-CN')
    }

    function fmtDateTimeLocal(value) {
      if (!value) return ''
      const date = new Date(value)
      if (Number.isNaN(date.getTime())) return ''
      const year = date.getFullYear()
      const month = String(date.getMonth() + 1).padStart(2, '0')
      const day = String(date.getDate()).padStart(2, '0')
      const hours = String(date.getHours()).padStart(2, '0')
      const minutes = String(date.getMinutes()).padStart(2, '0')
      return `${year}-${month}-${day}T${hours}:${minutes}`
    }

    function getCurrentPage(sectionKey) {
      return Math.max(1, Number(state.paging[sectionKey] || 1))
    }

    function setCurrentPage(sectionKey, page) {
      state.paging[sectionKey] = Math.max(1, Number(page || 1))
    }

    function resetCurrentPage(sectionKey) {
      setCurrentPage(sectionKey, 1)
    }

    function getCurrentPageSize(sectionKey) {
      const pageSize = Number(state.pageSize[sectionKey] || DEFAULT_PAGE_LIMIT)
      return PAGE_SIZE_OPTIONS.includes(pageSize) ? pageSize : DEFAULT_PAGE_LIMIT
    }

    function setCurrentPageSize(sectionKey, pageSize) {
      const normalized = Number(pageSize || DEFAULT_PAGE_LIMIT)
      state.pageSize[sectionKey] = PAGE_SIZE_OPTIONS.includes(normalized) ? normalized : DEFAULT_PAGE_LIMIT

    function showLogin(errorMessage = '') {

      document.getElementById('appShell').classList.add('hidden')
      document.getElementById('loginShell').classList.remove('hidden')
      document.getElementById('loginError').textContent = errorMessage
    }

    async function api(url, options = {}) {
      const response = await fetch(url, {
        credentials: 'include',
        headers: { ...(options.headers || {}) },
        ...options
      })
      const data = await response.json().catch(() => ({}))
      if (response.status === 401 && !/\/api\/admin\/login$/.test(url)) {
        showLogin('登录状态已失效，请重新登录')
        throw new Error(data.error || '登录状态已失效，请重新登录')
      }
      if (!response.ok) {
        throw new Error(data.error || `HTTP ${response.status}`)
      }
      return data
    }

    function buildPagination(total, page, limit) {
      if (!total) return ''
      const totalPages = Math.max(1, Math.ceil(total / limit))
      return `
        <div class="pagination">
          <div class="pagination-summary">第 ${page} / ${totalPages} 页，共 ${total} 条，每页 ${limit} 条</div>
          <div class="pagination-actions">
            <label>每页
              <select id="pageSizeSelect">
                ${PAGE_SIZE_OPTIONS.map((size) => `<option value="${size}" ${size === limit ? 'selected' : ''}>${size}</option>`).join('')}
              </select>
            </label>
            <button class="btn btn-secondary" data-page-target="${page - 1}" ${page <= 1 ? 'disabled' : ''}>上一页</button>
            <span class="badge">第 ${page} 页</span>
            <button class="btn btn-secondary" data-page-target="${page + 1}" ${page >= totalPages ? 'disabled' : ''}>下一页</button>
            <label>跳至
              <input id="pageJumpInput" type="number" min="1" max="${totalPages}" value="${page}" />
            </label>
            <button class="btn btn-secondary" id="pageJumpBtn">跳转</button>
          </div>
        </div>
      `
    }

    function bindPagination(sectionKey, renderFn, total, limit) {
      const totalPages = Math.max(1, Math.ceil(total / limit))
      document.querySelectorAll('[data-page-target]').forEach((button) => {
        button.addEventListener('click', () => {
          const targetPage = Number(button.dataset.pageTarget || '1')
          setCurrentPage(sectionKey, targetPage)
          renderFn()
        })
      })
      const pageSizeSelect = document.getElementById('pageSizeSelect')
      if (pageSizeSelect) {
        pageSizeSelect.addEventListener('change', (event) => {
          setCurrentPageSize(sectionKey, Number(event.target.value || DEFAULT_PAGE_LIMIT))
          resetCurrentPage(sectionKey)
          renderFn()
        })
      }
      const pageJumpInput = document.getElementById('pageJumpInput')
      const pageJumpBtn = document.getElementById('pageJumpBtn')
      const jump = () => {
        if (!pageJumpInput) return
        const targetPage = Math.min(totalPages, Math.max(1, Number(pageJumpInput.value || '1')))
        setCurrentPage(sectionKey, targetPage)
        renderFn()
      }
      if (pageJumpBtn) pageJumpBtn.addEventListener('click', jump)
      if (pageJumpInput) {
        pageJumpInput.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            jump()
          }
        })
      }
    }

    function defaultBackfillDates() {
      const end = new Date()
      end.setDate(end.getDate() - 1)
      const start = new Date(end)
      start.setDate(start.getDate() - 89)
      const format = (value) => {
        const year = value.getFullYear()
        const month = String(value.getMonth() + 1).padStart(2, '0')
        const day = String(value.getDate()).padStart(2, '0')
        return `${year}-${month}-${day}`
      }
      return { startDate: format(start), endDate: format(end) }
    }

    function renderCell(key, value) {

      if (key === 'status') return renderStatus(value)
      return escapeHtml(value == null || value === '' ? '-' : value)
    }

    function renderResourceCell(key, value, item) {
      if (key === 'sourceName' && item && item.sourceUrl) {
        const linkText = value == null || value === '' ? '查看来源' : value
        return `<a class="source-link" href="${escapeHtml(item.sourceUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(linkText)}</a>`
      }
      return renderCell(key, value)
    }

    function buildScoreRankTrendHint(items) {
      if (!Array.isArray(items) || items.length < 2) {
        return '趋势提示：录入同一省份、年份、科类下的连续分数段后，这里会提示高分到低分的位次变化。'
      }
      const rankedItems = items
        .filter((item) => Number.isFinite(Number(item.score)) && Number.isFinite(Number(item.rank)))
        .map((item) => ({ ...item, score: Number(item.score), rank: Number(item.rank), count: Number(item.count || 0) }))
        .sort((left, right) => right.score - left.score || left.rank - right.rank)
      if (rankedItems.length < 2) {
        return '趋势提示：当前结果缺少可比较的分数和位次数据，无法生成分数段趋势。'
      }
      const highest = rankedItems[0]
      const lowest = rankedItems[rankedItems.length - 1]
      const rankDelta = lowest.rank - highest.rank
      const scoreDelta = highest.score - lowest.score
      const monotonic = rankedItems.every((item, index) => index === 0 || item.rank >= rankedItems[index - 1].rank)
      const trendText = monotonic ? '分数越高，位次越靠前' : '当前页存在位次波动，请重点核对异常分段'
      return `趋势提示：当前页最高分 ${highest.score} 分对应位次 ${highest.rank}，最低分 ${lowest.score} 分对应位次 ${lowest.rank}，分差 ${scoreDelta} 分，位次跨度 ${rankDelta}。${trendText}。`
    }

    function renderValidity(item) {
      if (!item || !item.validityType || item.validityType === 'unlimited') return '长期有效'
      if (item.validityType === 'times') return `${Number(item.validTimes || 0)} 次有效`
      if (item.validityType === 'range') {
        const fromText = item.validFrom ? fmtDate(item.validFrom) : '未设置开始'
        const untilText = item.validUntil ? fmtDate(item.validUntil) : '未设置结束'
        return `${fromText} 至 ${untilText}`
      }
      return '长期有效'
    }

    function renderStatus(status) {
      const text = status || '-'
      const cls = /fail|disabled/.test(text) ? 'danger' : /success|enabled|succeeded/.test(text) ? 'success' : ''
      return `<span class="badge ${cls}">${escapeHtml(text)}</span>`
    }

    function compactStudent(raw) {
      if (!raw) return '-'
      try {
        const parsed = typeof raw === 'string' ? JSON.parse(raw) : raw
        return [parsed.province, parsed.subject, parsed.score ? `${parsed.score}分` : '', parsed.rank ? `${parsed.rank}名` : '', parsed.targetMajor || '']
          .filter(Boolean)
          .join(' / ')
      } catch (_) {
        return String(raw).slice(0, 48)
      }
    }

        }
        if (field.type === 'checkbox') {
          return `
            <div class="field ${field.full ? 'full' : ''}">
              <label>${field.label}</label>
              <label class="checkbox-row"><input type="checkbox" name="${field.name}" ${item[field.name] ? 'checked' : ''} /> ${field.checkboxLabel || '启用'}</label>
            </div>
          `
        }
        if (field.type === 'select') {
          return `
            <div class="field ${field.full ? 'full' : ''}">
              <label>${field.label}</label>
              <select name="${field.name}">
                ${field.options.map((option) => `<option value="${option}" ${String(item[field.name] || '') === option ? 'selected' : ''}>${option}</option>`).join('')}
              </select>
            </div>
          `
        }
        return `
          <div class="field ${field.full ? 'full' : ''}">
            <label>${field.label}</label>
            <input type="${field.type}" name="${field.name}" value="${escapeHtml(item[field.name] || '')}" ${field.required ? 'required' : ''} />
          </div>
        `
      }).join('')

      document.getElementById('modal').innerHTML = `
        <div class="modal-card">
          <div class="modal-header">
            <div>
              <div class="eyebrow">编辑记录</div>
              <h3 style="margin:0;">${item.id ? '编辑' : '新增'}${section.label}</h3>
            </div>
            <button id="closeModalBtn" class="btn btn-secondary">关闭</button>
          </div>
          <form id="entityForm" class="stack">
            <div class="form-grid">${fieldsHtml}</div>
            <div class="toolbar-actions" style="justify-content:flex-end;">
              <button type="button" id="cancelBtn" class="btn btn-secondary">取消</button>
              <button type="submit" class="btn btn-primary">保存</button>
            </div>
            <div id="formError" class="error"></div>
          </form>
        </div>
      `
      document.getElementById('modal').classList.remove('hidden')
      document.getElementById('closeModalBtn').addEventListener('click', closeModal)
      document.getElementById('cancelBtn').addEventListener('click', closeModal)
      document.getElementById('entityForm').addEventListener('submit', async (event) => {
        event.preventDefault()
        const payload = collectFormData(event.target, section.fields)
        try {
          await api(section.endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
          closeModal()
          renderCRUD(sectionKey)
        } catch (error) {
          document.getElementById('formError').textContent = error.message
        }
      })
    }

    function openVIPForm(item) {
      const fields = [
        { name: 'id', type: 'hidden' },
        { name: 'productId', label: '产品标识', type: 'text', required: true },
        { name: 'name', label: '产品名称', type: 'text', required: true },
        { name: 'description', label: '描述', type: 'text', full: true },
        { name: 'amountFen', label: '金额(分)', type: 'number', required: true },
        { name: 'validityType', label: '有效方式', type: 'select', options: [
          { value: 'unlimited', label: '长期有效' },
          { value: 'times', label: '按次数有效' },
          { value: 'range', label: '按时间范围有效' }
        ] },
        { name: 'validTimes', label: '有效次数', type: 'number' },
        { name: 'validFrom', label: '开始时间', type: 'datetime-local', full: true },
        { name: 'validUntil', label: '结束时间', type: 'datetime-local', full: true },
        { name: 'sortOrder', label: '排序', type: 'number', required: true },
        { name: 'showEntry', label: '展示 VIP 入口', type: 'checkbox', full: true },
        { name: 'enabled', label: '启用', type: 'checkbox', full: true }
      ]
      document.getElementById('modal').innerHTML = `
        <div class="modal-card">
          <div class="modal-header">
            <div>
              <div class="eyebrow">VIP 配置</div>
              <h3 style="margin:0;">${item.id ? '编辑产品' : '新增产品'}</h3>
            </div>
            <button id="closeModalBtn" class="btn btn-secondary">关闭</button>
          </div>
          <form id="vipForm" class="stack">
            <div class="form-grid">${fields.map((field) => {
              if (field.type === 'hidden') return `<input type="hidden" name="${field.name}" value="${escapeHtml(item[field.name] || '')}" />`
              if (field.type === 'checkbox') return `<div class="field full"><label>${field.label}</label><label class="checkbox-row"><input type="checkbox" name="${field.name}" ${item[field.name] ? 'checked' : ''} /> 启用售卖</label></div>`
              if (field.type === 'select') {
                return `<div class="field ${field.full ? 'full' : ''}"><label>${field.label}</label><select name="${field.name}">${field.options.map((option) => `<option value="${option.value}" ${String(item[field.name] || 'unlimited') === option.value ? 'selected' : ''}>${option.label}</option>`).join('')}</select></div>`
              }
              const inputValue = field.type === 'datetime-local' ? fmtDateTimeLocal(item[field.name]) : (item[field.name] || '')
              return `<div class="field ${field.full ? 'full' : ''}"><label>${field.label}</label><input type="${field.type}" name="${field.name}" value="${escapeHtml(inputValue)}" ${field.required ? 'required' : ''}></div>`
            }).join('')}</div>
            <div class="toolbar-actions" style="justify-content:flex-end;">
              <button type="button" id="cancelBtn" class="btn btn-secondary">取消</button>
              <button type="submit" class="btn btn-primary">保存</button>
            </div>
            <div id="formError" class="error"></div>
          </form>
        </div>
      `
      document.getElementById('modal').classList.remove('hidden')
      document.getElementById('closeModalBtn').addEventListener('click', closeModal)
      document.getElementById('cancelBtn').addEventListener('click', closeModal)
      document.getElementById('vipForm').addEventListener('submit', async (event) => {
        event.preventDefault()
        const payload = collectFormData(event.target, fields)
        try {
          await api('/api/admin/vip-products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
          closeModal()
          renderVIP(state.active)
        } catch (error) {
          document.getElementById('formError').textContent = error.message
        }
      })
    }

    function collectFormData(form, fields) {
      const data = {}
      fields.forEach((field) => {
        const element = form.elements[field.name]
        if (!element) return
        if (field.type === 'checkbox') {
          data[field.name] = !!element.checked
          return
        }
        if (field.type === 'number' || field.name === 'id') {
          data[field.name] = element.value === '' ? 0 : Number(element.value)
          return
        }
        if (field.type === 'datetime-local') {
          data[field.name] = element.value ? new Date(element.value).toISOString() : ''
          return
        }
        data[field.name] = element.value
      })
      return data
    }

    function openViewer(item) {
      document.getElementById('modal').innerHTML = `
        <div class="modal-card">
          <div class="modal-header">
            <div>
              <div class="eyebrow">任务详情</div>
              <h3 style="margin:0;">${escapeHtml(item.title || '任务详情')}</h3>
            </div>
            <button id="closeModalBtn" class="btn btn-secondary">关闭</button>
          </div>
          <div class="stack">
            <div><strong>状态：</strong> ${renderStatus(item.status)}</div>
            <div><strong>提供方：</strong> ${escapeHtml(item.provider || '-')}</div>
            <div><strong>考生：</strong> ${escapeHtml(compactStudent(item.student))}</div>
            <div><strong>需求：</strong><div class="viewer">${escapeHtml(item.demand || '-')}</div></div>
            <div><strong>报告：</strong><div class="viewer">${escapeHtml(item.report || '-')}</div></div>
            <div><strong>错误信息：</strong><div class="viewer">${escapeHtml(item.errorMessage || '-')}</div></div>
          </div>
        </div>
      `
      document.getElementById('modal').classList.remove('hidden')
      document.getElementById('closeModalBtn').addEventListener('click', closeModal)
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden')
      document.getElementById('modal').innerHTML = ''
    }

    async function renderApp() {
      renderNav()
      bindNav()
      setHeader()
      if (state.active === 'dashboard') return renderDashboard()
      if (state.active === 'colleges') return renderColleges()
      if (state.active === 'provinceLines') return renderProvinceLines()
      if (state.active === 'scoreRanks') return renderScoreRanks()
      if (state.active === 'orders') return renderOrders()
      if (state.active === 'volunteers' || state.active === 'aiTasks') return renderTasks(state.active)
      if (state.active === 'vipProducts' || state.active === 'paymentItems') return renderVIP('paymentItems')
      return renderCRUD(state.active)
    }

    async function checkLogin() {
      try {
        const data = await api('/api/admin/me', { method: 'POST' })
        state.currentUser = data.user
        hydrateStateFromLocation()
        document.getElementById('loginShell').classList.add('hidden')
        document.getElementById('appShell').classList.remove('hidden')
        renderApp()
      } catch (_) {
        showLogin('')
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault()
      document.getElementById('loginError').textContent = ''
      try {
        const payload = {
          username: event.target.username.value.trim(),
          password: event.target.password.value
        }
        const data = await api('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
        state.currentUser = data.user
        hydrateStateFromLocation()
        document.getElementById('loginShell').classList.add('hidden')
        document.getElementById('appShell').classList.remove('hidden')
        renderApp()
      } catch (error) {
        document.getElementById('loginError').textContent = error.message
      }
    })

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await api('/api/admin/logout', { method: 'POST' })
      } finally {
        showLogin('')
      }
    })

    checkLogin()
  </script>
</body>
</html>
